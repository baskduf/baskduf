  <text x="406" y="203" fill="#4A536D" font-family="Segoe UI, Pretendard, Arial, sans-serif" font-size="25" font-weight="700" letter-spacing="0">Wonbin Choi</text>
  <text x="406" y="244" fill="#68708A" font-family="Segoe UI, Pretendard, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="0">UX-minded developer · Flutter · Next.js · Django</text>
  <rect x="406" y="269" width="204" height="12" rx="6" fill="#00B8A9" opacity="0.86"/>
  <rect x="624" y="269" width="66" height="12" rx="6" fill="#FFB703" opacity="0.9"/>

  <g opacity="0.85">
