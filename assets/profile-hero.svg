<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Wonbin Choi profile hero</title>
  <desc id="desc">A GitHub profile banner with a custom baskduf logo and an animated developer character.</desc>
  <defs>
    <linearGradient id="bg" x1="87" y1="26" x2="1114" y2="371" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="0.38" stop-color="#EEF7F6"/>
      <stop offset="0.68" stop-color="#FDF5EA"/>
      <stop offset="1" stop-color="#F8EFF1"/>
    </linearGradient>
    <linearGradient id="logoGradient" x1="86" y1="105" x2="260" y2="258" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00B8A9"/>
      <stop offset="0.55" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#FF6B6B"/>
    </linearGradient>
    <filter id="cardShadow" x="31" y="43" width="1138" height="336" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#151A2F" flood-opacity="0.15"/>
    </filter>
    <filter id="characterShadow" x="728" y="48" width="337" height="288" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#151A2F" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="42" fill="url(#bg)"/>
  <path d="M0 333C180 276 260 358 415 310C595 254 680 139 864 177C1008 206 1050 310 1200 238V420H0V333Z" fill="#FFFFFF" opacity="0.66"/>
  <path d="M83 321C227 273 333 354 474 309C620 263 693 183 838 208C975 232 1045 307 1147 267" stroke="#DDE6F6" stroke-width="3" stroke-linecap="round"/>

  <g filter="url(#cardShadow)">
