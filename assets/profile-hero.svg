    <rect x="64.5" y="74.5" width="706" height="257" rx="33.5" stroke="#DDE6F6"/>
  </g>

  <g>
    <path d="M109 231L147 123H194L232 231H194L185 202H155L146 231H109Z" fill="url(#logoGradient)"/>
    <path d="M162 175H178L171 148L162 175Z" fill="#FFFFFF"/>
